  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n* { box-sizing: border-box; margin: 0; padding: 0; }\n:root {\n  --bg: #f4f5f2;\n  --bg-card: #ffffff;\n  --ink-900: #0a1a0e;\n  --ink-600: rgba(10,26,14,0.6);\n  --ink-400: rgba(10,26,14,0.4);\n  --ink-200: rgba(10,26,14,0.12);\n  --ink-100: rgba(10,26,14,0.06);\n  --green-500: #00c45c;\n  --green-600: #00a44e;\n  --green-900: #0a1a0e;\n  --radius-sm: 8px;\n  --radius-md: 12px;\n  --radius-lg: 16px;\n  --radius-xl: 20px;\n  --font-sans: 'DM Sans', sans-serif;\n}\nbody { background: #e8e9e5; font-family: var(--font-sans); color: var(--ink-900); }\n.page { max-width: 900px; margin: 0 auto; padding: 48px 24px 80px; }\n\n/* Section headers */\n.section { margin-bottom: 56px; }\n.section-label { font-size: 10px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--green-600); margin-bottom: 8px; }\n.section-title { font-size: 22px; font-weight: 800; color: var(--ink-900); margin-bottom: 24px; letter-spacing: -0.5px; }\n.divider { height: 1px; background: var(--ink-200); margin-bottom: 32px; }\n\n/* Card */\n.card { background: #f4f5f2; border-radius: 16px; padding: 24px; }\n\n/* Color swatches */\n.swatches { display: flex; flex-wrap: wrap; gap: 12px; }\n.swatch { display: flex; flex-direction: column; gap: 8px; }\n.swatch-box { width: 80px; height: 80px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.06); }\n.swatch-name { font-size: 11px; font-weight: 600; color: var(--ink-900); }\n.swatch-value { font-size: 10px; color: var(--ink-400); font-family: 'Courier New', monospace; }\n\n/* Type specimens */\n.type-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--ink-100); }\n.type-row:last-child { border-bottom: none; margin-bottom: 0; }\n.type-meta { display: flex; gap: 16px; flex-wrap: wrap; }\n.type-badge { font-size: 10px; color: var(--ink-400); background: var(--ink-100); border-radius: 4px; padding: 2px 8px; font-family: 'Courier New', monospace; }\n\n/* Spacing */\n.spacing-row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }\n.spacing-bar { height: 16px; background: var(--green-500); border-radius: 3px; opacity: 0.7; }\n.spacing-label { font-size: 11px; color: var(--ink-400); font-family: 'Courier New', monospace; min-width: 120px; }\n\n/* Radius */\n.radius-grid { display: flex; flex-wrap: wrap; gap: 16px; }\n.radius-card { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }\n.radius-box { width: 64px; height: 64px; background: var(--green-900); }\n.radius-name { font-size: 11px; font-weight: 600; color: var(--ink-900); }\n.radius-val { font-size: 10px; color: var(--ink-400); font-family: 'Courier New', monospace; }\n\n/* Components */\n.comp-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin-bottom: 24px; }\n.comp-label { font-size: 10px; color: var(--ink-400); margin-top: 8px; text-align: center; }\n.comp-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }\n\n/* Buttons */\n.btn-primary { background: #0a1a0e; border: none; border-radius: 12px; padding: 14px 28px; color: white; font-size: 14px; font-weight: 600; font-family: var(--font-sans); cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }\n.btn-secondary { background: transparent; border: 1.5px solid rgba(10,26,14,0.18); border-radius: 12px; padding: 14px 28px; color: #0a1a0e; font-size: 14px; font-weight: 500; font-family: var(--font-sans); cursor: pointer; }\n.btn-disabled { background: rgba(0,0,0,0.08); border: none; border-radius: 12px; padding: 14px 28px; color: rgba(10,26,14,0.3); font-size: 14px; font-weight: 600; font-family: var(--font-sans); cursor: not-allowed; }\n\n/* Input */\n.input-field { background: white; border: 1.5px solid rgba(10,26,14,0.15); border-radius: 12px; padding: 13px 16px; font-size: 14px; font-family: var(--font-sans); color: #0a1a0e; width: 220px; outline: none; }\n.input-active { border-color: #00c45c; box-shadow: 0 0 0 3px rgba(0,196,92,0.12); }\n\n/* Top bar */\n.topbar { background: #f4f5f2; border-bottom: 1px solid rgba(0,0,0,0.06); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-radius: 12px 12px 0 0; }\n\n/* Tag */\n.tag { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 3px; color: var(--green-600); text-transform: uppercase; background: rgba(0,196,92,0.1); padding: 4px 10px; border-radius: 6px; }\n\n/* Accent bar */\n.accent-bar { height: 4px; background: linear-gradient(90deg, #00c45c, #00a44e); border-radius: 0 0 4px 4px; }\n\n/* Nav */\nnav { background: #0a1a0e; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }\nnav span { color: white; font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }\nnav .dot { width: 8px; height: 8px; border-radius: 50%; background: #00c45c; }\n\n/* Code block */\npre { background: #0a1a0e; color: #e8f5e0; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.7; padding: 20px; border-radius: 12px; overflow-x: auto; }\n.kw { color: #00c45c; }\n.str { color: #a8e6c0; }\n.cmt { color: rgba(255,255,255,0.3); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<nav>\n  <span>Stadium · Design System<\u002Fspan>\n  <div class=\"dot\"><\u002Fdiv>\n<\u002Fnav>\n\n<div class=\"page\">\n\n  <!-- Header -->\n  <div style=\"margin-bottom:48px; padding-top:8px;\">\n    <div class=\"tag\" style=\"margin-bottom:16px;\">Dirección C · Editorial Claro<\u002Fdiv>\n    <h1 style=\"font-size:40px;font-weight:800;letter-spacing:-1.5px;line-height:1.05;margin-bottom:12px;\">Design System<br>para desarrollo<\u002Fh1>\n    <p style=\"font-size:15px;color: vy / HTML) */<\u002Fspan>\nfont-family: <span class=\"str\">'DM Sans'<\u002Fspan>, -apple-system, BlinkMacSystemFont, sans-serif;<\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ─── ESPACIADO Y RADIOS ─── -->\n  <div class=\"section\">\n    <div class=\"section-label\">03<\u002Fdiv>\n    <div class=\"section-title\">Espaciado y radios<\u002Fdiv>\n    <div class=\"divider\"><\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n      <div class=\"card\">\n        <p style=\"font-size:12px;font-weight:600;color:rgba(10,26,14,0.5);margin-bottom:20px;letter-spacing:1px;text-transform:uppercase;\">Escala de espaciado<\u002Fp>\n        <div class=\"spacing-row\"><div class=\"spacing-bar\" style=\"width:4px;\"><\u002Fdiv><div class=\"spacing-label\">4px — xs<\u002Fdiv><\u002Fdiv>\n        <div class=\"spacing-row\"><div class=\"spacing-bar\" style=\"width:8px;\"><\u002Fdiv><div class=\"spacing-label\">8px — sm<\u002Fdiv><\u002Fdiv>\n        <div class=\"spacing-row\"><div class=\"spacing-bar\" style=\"width:12px;\"><\u002Fdiv><div class=\"spacing-label\">12px — md<\u002Fdiv><\u002Fdiv>\n        <div class=\"spacing-row\"><div class=\"spacing-bar\" style=\"width:16px;\"><\u002Fdiv><div class=\"spacing-label\">16px — lg (padding pantalla)<\u002Fdiv><\u002Fdiv>\n        <div class=\"spacing-row\"><div class=\"spacing-bar\" style=\"width:20px;\"><\u002Fdiv><div class=\"spacing-label\">20px — xl (padding top bar)<\u002Fdiv><\u002Fdiv>\n        <div class=\"spacing-row\"><div class=\"spacing-bar\" style=\"width:24px;\"><\u002Fdiv><div class=\"spacing-label\">24px — 2xl (padding sección)<\u002Fdiv><\u002Fdiv>\n        <div class=\"spacing-row\"><div class=\"spacing-bar\" style=\"width:32px;\"><\u002Fdiv><div class=\"spacing-label\">32px — 3xl (separación)<\u002Fdiv><\u002Fdiv>\n        <div class=\"spacing-row\"><div class=\"spacing-bar\" style=\"width:48px;\"><\u002Fdiv><div class=\"spacing-label\">48px — 4xl (separación grande)<\u002Fdiv><         <div style=\"position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;background:#00c45c;display:flex;align-items:center;justify-content:center;\">\n            <svg width=\"10\" height=\"10\" viewBox=\"0 0 10 10\" fill=\"none\"><path d=\"M2 5L4.5 7.5L8 3\" stroke=\"white\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"width:72px;height:72px;border-radius:50%;background:rgba(0,196,92,0.12);border:2px solid rgba(0,196,92,0.3);display:flex;align-items:center;justify-content:center;\">\n            <svg width=\"32\" height=\"32\" viewBox=\"0 0 36 36\" fill=\"none\"><circle cx=\"18\" cy=\"14\" r=\"7\" fill=\"rgba(0,164,78,0.3)\"><\u002Fcircle><path d=\"M4 34C4 26 10 22 18 22C26 22 32 26 32 34\" stroke=\"rgba(0,164,78,0.3)\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"font-size:12px;font-weight:700;color:#0a1a0e;text-align:center;\">Gilberto Mora<\u002Fdiv>\n          <div style=\"font-size:10px;color:#00a44e;font-weight:500;\">Delantero<\u002Fdiv>\n          <div style=\"font-size:10px;color:#00c45c;margin-top:4px;\">Seleccionado<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <pre style=\"margin-top:20px;font-size:11px;\"><span class=\"cmt\">/* Card normal */<\u002Fspan>\nbackground: rgba(0,0,0,0.06);\nborder: 2px solid transparent;\nborder-radius: 16px; padding: 16px 12px 12px;\n\n<span class=\"cmt\">/* Card seleccionado */<\u002Fspan>\nbackground: <span class=\"str\">#ffffff<\u002Fspan>;\nborder: 2px solid <span class=\"str\">#00c45c<\u002Fspan>;\n\n<span class=\"cmt\">/* Avatar seleccionado */<\u002Fspan>\nbackground: rgba(0,196,92,0.12);\nborder: 2px solid rgba(0,196,92,0.3);\n\n<span class=\"cmt\">/* Check badge */<\u002Fspan>\nwidth: 20px; height: 20px;\nborder-radius: 50%; background: <span class=\"str\">#00c45c<\u002Fspan>;\nposition: absolute; top: 8px; right: 8px;<\u002Fpre>\n    <\u002Fdiv>\n\n    <!-- Botón de cámara -->\n    <div class=\"card\" style=\"margin-bottom:16px;\">\n      <p style=\"font-size:12px;font-weight:600;color:rgba(10,26,14,0.5);margin-bottom:20px;letter-spacing:1px;text-transform:uppercase;\">Botón de captura<\u002Fp>\n      <div style=\"display:flex;align-items:center;gap:24px;\">\n        <div style=\"width:64px;height:64px;border-radius:50%;background:#0a1a0e;border:4px solid rgba(0,196,92,0.3);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.2);\">\n          <div style=\"width:24px;height:24px;border-radius:50%;background:#00c45c;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <pre style=\"flex:1;font-size:11px;background:#0a1a0e;padding:16px;border-radius:10px;margin:0;\"><span class=\"cmt\">/* Contenedor externo */<\u002Fspan>\nwidth: 64px; height: 64px;\nborder-radius: 50%;\nbackground: <span class=\"str\">#0a1a0e<\u002Fspan>;\nborder: 4px solid rgba(0,196,92,0.3);\nbox-shadow: 0 4px 16px rgba(0,0,0,0.2);\n\n<span class=\"cmt\">/* Círculo interior */<\u002Fspan>\nwidth: 24px; height: 24px;\nborder-radius: 50%;\nbackground: <span class=\"str\">#00c45c<\u002Fspan>;<\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Tarjeta QR resultado -->\n    <div class=\"card\">\n      <p style=\"font-size:12px;font-weight:600;color:rgba(10,26,14,0.5);margin-bottom:20px;letter-spacing:1px;text-transform:uppercase;\">Panel de resultado (QR)<\u002Fp>\n      <div style=\"background:#f4f5f2;border-top:1px solid rgba(0,0,0,0.06);padding:20px;border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:14px;\">\n        <div style=\"display:flex;align-items:center;gap:8px;\">\n          <div style=\"width:8px;height:8px;border-radius:50%;background:#00c45c;\"><\u002Fdiv>\n          <span style=\"font-size:15px;font-weight:600;color:#0a1a0e;\">Tu foto está lista<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:16px;align-items:center;\">\n          <div style=\"border-radius:10px;padding:8px;background:white;border:1px solid rgba(0,0,0,0.08);box-shadow:0 2px 8px rgba(0,0,0,0.06);\">\n            <svg width=\"64\" height=\"64\" viewBox=\"0 0 80 80\" fill=\"none\"><rect width=\"80\" height=\"80\" fill=\"white\"><\u002Frect><rect x=\"5\" y=\"5\" width=\"28\" height=\"28\" rx=\"2\" fill=\"#0a1a0e\"><\u002Frect><rect x=\"9\" y=\"9\" width=\"20\" height=\"20\" rx=\"1\" fill=\"white\"><\u002Frect><rect x=\"12\" y=\"12\" width=\"14\" height=\"14\" rx=\"1\" fill=\"#0a1a0e\"><\u002Frect><rect x=\"47\" y=\"5\" width=\"28\" height=\"28\" rx=\"2\" fill=\"#0a1a0e\"><\u002Frect><rect x=\"51\" y=\"9\" width=\"20\" height=\"20\" rx=\"1\" fill=\"white\"><\u002Frect><rect x=\"54\" y=\"12\" width=\"14\" height=\"14\" rx=\"1\" fill=\"#0a1a0e\"><\u002Frect><rect x=\"5\" y=\"47\" width=\"28\" height=\"28\" rx=\"2\" fill=\"#0a1a0e\"><\u002Frect><rect x=\"9\" y=\"51\" width=\"20\" height=\"20\" rx=\"1\" fill=\"white\"><\u002Frect><rect x=\"12\" y=\"54\" width=\"14\" height=\"14\" rx=\"1\" fill=\"#0a1a0e\"><\u002Frect><rect x=\"47\" y=\"47\" width=\"8\" height=\"8\" fill=\"#0a1a0e\"><\u002Frect><rect x=\"59\" y=\"47\" width=\"8\" height=\"8\" fill=\"#0a1a0e\"><\u002Frect><rect x=\"47\" y=\"59\" width=\"8\" height=\"8\" fill=\"#0a1a0e\"><\u002Frect><rect x=\"59\" y=\"59\" width=\"8\" height=\"8\" fill=\"#0a1a0e\"><\u002Frect><\u002Fsvg>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:13px;font-weight:600;color:#0a1a0e;margin-bottom:4px;\">Escanea con tu cámara<\u002Fdiv>\n            <div style=\"font-size:12px;color:rgba(10,26,14,0.5);line-height:1.5;\">Descarga tu foto al instante desde tu teléfono.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"btn-primary\" style=\"width:100%;justify-content:center;\">Volver al inicio →<\u002Fbutton>\n      <\u002Fdiv>\n      <pre style=\"margin-top:16px;font-size:11px;\"><span class=\"cmt\">/* Panel fijo en bottom */<\u002Fspan>\nbackground: <span class=\"str\">#f4f5f2<\u002Fspan>;\nborder-top: 1px solid rgba(0,0,0,0.06);\npadding: 20px 20px 32px;\n\n<span class=\"cmt\">/* QR wrapper */<\u002Fspan>\nbackground: white; border-radius: 10px;\nborder: 1px solid rgba(0,0,0,0.08);\nbox-shadow: 0 2px 8px rgba(0,0,0,0.06);\npadding: 8px;<\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ─── FLUJO ─── -->\n  <div class=\"section\">\n    <div class=\"section-label\">05<\u002Fdiv>\n    <div class=\"section-title\">Flujo de pantallas<\u002Fdiv>\n    <div class=\"divider\"><\u002Fdiv>\n    <div class=\"card\">\n      <div style=\"display:flex;align-items:center;flex-wrap:wrap;gap:8px;font-size:13px;color:#0a1a0e;\">\n        <div style=\"background:#0a1a0e;color:white;padding:8px 16px;border-radius:8px;font-weight:600;\">01 Bienvenida<\u002Fdiv>\n        <svg width=\"20\" height=\"16\" viewBox=\"0 0 20 16\" fill=\"none\"><path d=\"M2 8H18M13 3L18 8L13 13\" stroke=\"#00c45c\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <div style=\"background:#0a1a0e;color:white;padding:8px 16px;border-radius:8px;font-weight:600;\">02 Jugadores<\u002Fdiv>\n        <svg width=\"20\" height=\"16\" viewBox=\"0 0 20 16\" fill=\"none\"><path d=\"M2 8H18M13 3L18 8L13 13\" stroke=\"#00c45c\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <div style=\"background:#0a1a0e;color:white;padding:8px 16px;border-radius:8px;font-weight:600;\">03 Cámara<\u002Fdiv>\n        <svg width=\"20\" height=\"16\" viewBox=\"0 0 20 16\" fill=\"none\"><path d=\"M2 8H18M13 3L18 8L13 13\" stroke=\"#00c45c\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <div style=\"background:#0a1a0e;color:white;padding:8px 16px;border-radius:8px;font-weight:600;\">04 Preview<\u002Fdiv>\n        <svg width=\"20\" height=\"16\" viewBox=\"0 0 20 16\" fill=\"none\"><path d=\"M2 8H18M13 3L18 8L13 13\" stroke=\"#00c45c\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <div style=\"background:#0a1a0e;color:white;padding:8px 16px;border-radius:8px;font-weight:600;\">05 Resultado<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:16px;font-size:12px;color:rgba(10,26,14,0.5);line-height:1.7;\">\n        <strong style=\"color:#0a1a0e;\">Reglas de navegación:<\u002Fstrong><br>\n        · Bienvenida → Jugadores: tap en \"Comenzar\"<br>\n        · Jugadores → Cámara: tap en \"Continuar\" (mínimo 1 seleccionado)<br>\n        · Cámara → Preview: tap en botón de captura<br>\n        · Preview → Resultado: tap en \"Enviar foto\"<br>\n        · Preview → Cámara: tap en \"Reintentar\"<br>\n        · Resultado → Bienvenida: tap en \"Volver al inicio\" o ✕\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ─── CSS VARIABLES ─── -->\n  <div class=\"section\">\n    <div class=\"section-label\">06<\u002Fdiv>\n    <div class=\"section-title\">Variables CSS (copiar directamente)<\u002Fdiv>\n    <div class=\"divider\"><\u002Fdiv>\n    <pre>:root {\n  <span class=\"cmt\">/* Fondos */<\u002Fspan>\n  --bg-primary:   <span class=\"str\">#f4f5f2<\u002Fspan>;\n  --bg-card:      <span class=\"str\">#ffffff<\u002Fspan>;\n  --bg-muted:     <span class=\"str\">rgba(0, 0, 0, 0.06)<\u002Fspan>;\n  --border:       <span class=\"str\">rgba(0, 0, 0, 0.12)<\u002Fspan>;\n\n  <span class=\"cmt\">/* Texto */<\u002Fspan>\n  --ink-900:      <span class=\"str\">#0a1a0e<\u002Fspan>;\n  --ink-600:      <span class=\"str\">rgba(10, 26, 14, 0.6)<\u002Fspan>;\n  --ink-400:      <span class=\"str\">rgba(10, 26, 14, 0.4)<\u002Fspan>;\n  --ink-200:      <span class=\"str\">rgba(10, 26, 14, 0.2)<\u002Fspan>;\n  --ink-100:      <span class=\"str\">rgba(10, 26, 14, 0.06)<\u002Fspan>;\n\n  <span class=\"cmt\">/* Acento verde */<\u002Fspan>\n  --green-500:    <span class=\"str\">#00c45c<\u002Fspan>;\n  --green-600:    <span class=\"str\">#00a44e<\u002Fspan>;\n  --green-100:    <span class=\"str\">rgba(0, 196, 92, 0.12)<\u002Fspan>;\n  --green-200:    <span class=\"str\">rgba(0, 196, 92, 0.3)<\u002Fspan>;\n  --green-grad:   <span class=\"str\">linear-gradient(90deg, #00c45c, #00a44e)<\u002Fspan>;\n\n  <span class=\"cmt\">/* Tipografía */<\u002Fspan>\n  --font-sans:    <span class=\"str\">'DM Sans'<\u002Fspan>, -apple-system, sans-serif;\n  --fw-regular:   400;\n  --fw-medium:    500;\n  --fw-semibold:  600;\n  --fw-bold:      700;\n  --fw-extrabold: 800;\n\n  <span class=\"cmt\">/* Border radius */<\u002Fspan>\n  --radius-sm:    6px;\n  --radius-md:    10px;\n  --radius-lg:    12px;\n  --radius-xl:    16px;\n  --radius-full:  9999px;\n\n  <span class=\"cmt\">/* Espaciado base: 4px grid */<\u002Fspan>\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-12: 48px;\n}<\u002Fpre>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
